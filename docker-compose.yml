services:
  # ── PhaseLink (Zeeble Chat Server) ───────────────────────────────────────────
  phaselink:
    build: phaselink/
    environment:
      PORT: 4000
      DB_PATH: /data/zeeble.db
      AUTH_SERVER_URL: ${AUTH_SERVER_URL:-https://api.zeeble.xyz}
      OWNER_BEAM_IDENTITY: ${OWNER_BEAM_IDENTITY:-}
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:8081}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      RUST_LOG: zeeble_server=info,tower_http=debug
    volumes:
      - ./phaselink.yaml:/data/phaselink.yaml
      - chat-db:/data
      - ./attachments:/data/attachments
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - zeeble-net

  # ── ZVoice (Voice/Stream Service) ────────────────────────────────────────────
  zvoice:
    build: zvoice/
    environment:
      PORT: 4001
      AUTH_SERVER_URL: ${AUTH_SERVER_URL:-https://api.zeeble.xyz}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      RUST_LOG: zvoice=info,tower_http=debug
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - zeeble-net

  # ── Caddy Reverse Proxy ───────────────────────────────────────────────────────
  # Default: HTTP only  (works out of the box behind Cloudflare Tunnel)
  # HTTPS:   set CADDYFILE=./caddy/Caddyfile.tls in your .env and provide cert paths
  caddy:
    image: caddy:2-alpine
    ports:
      - "${HTTP_PORT:-8081}:8081"
      - "${HTTPS_PORT:-8444}:8444"
    volumes:
      - ${CADDYFILE:-./caddy/Caddyfile.tls}:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      HTTP_PORT: ${HTTP_PORT:-8081}
      HTTPS_PORT: ${HTTPS_PORT:-8444}
      TLS_CERT: ${TLS_CERT:-/certs/fullchain.pem}
      TLS_KEY: ${TLS_KEY:-/certs/privkey.pem}
    depends_on:
      - phaselink
    restart: unless-stopped
    networks:
      - zeeble-net

  # ── Redis — pub/sub event bus + voice room presence ───────────────────────────
  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    command: redis-server --save 60 1 --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - zeeble-net

networks:
  zeeble-net:
    driver: bridge

volumes:
  redis-data:
  chat-db:
  caddy_data:
  caddy_config:
